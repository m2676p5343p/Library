<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <div class="inputPair">
        <h:outputLabel for="inputTitle" value="Title:"/>
        <h:inputText id="inputTitle" value="#{newItemBackingBean.title}"
        required="true"/>
    </div>
    <div class="inputPair">
        <h:outputLabel for="inputAuthor" value="Author:"/>
        <h:inputText id="inputAuthor" value="#{newItemBackingBean.author}"
        required="true"/>
    </div>
    <div class="inputPair">
        <h:outputLabel for="inputGenre" value="Genre:"/>
        <h:inputText id="inputGenre" value="#{newItemBackingBean.genre}"
        required="true"/>
    </div>
</ui:composition>
