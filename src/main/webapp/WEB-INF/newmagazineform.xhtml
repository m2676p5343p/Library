<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <div class="inputPair">
        <h:outputLabel for="inputTitle" value="Title:"/>
        <h:inputText id="inputTitle" value="#{newItemBackingBean.title}"
        required="true"/>
    </div>
    <div class="inputPair">
        <h:outputLabel for="inputNumPages" value="Number of Pages:"/>
        <h:inputText id="inputDuration" value="#{newItemBackingBean.numPages}"
        required="true"/>
    </div>
    <div class="inputPair">
        <h:outputLabel for="inputGenre" value="Genre:"/>
        <h:inputText id="inputGenre" value="#{newItemBackingBean.genre}"
        required="true"/>
    </div>
</ui:composition>
