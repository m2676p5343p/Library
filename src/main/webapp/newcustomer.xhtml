<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="jakarta.faces.facelets"
        xmlns:h="jakarta.faces.html"
        xmlns:f="jakarta.faces.core">
        
      <h:head>
      	<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
      	<h:outputStylesheet name="css/output.css"/>
        <title>newcustomer</title>
      </h:head>
      
      <body>
		<ui:include src="/WEB-INF/topnav.xhtml"/>
		<ui:insert name="aah"/>
      	<div id="content">
      		<h:messages id="messages2" globalOnly="false"/>
      		<h:form id="addcustomer">
      			<h2>First Name:</h2>
      			<h:inputText id="inputFirstName" value="#{customerBackingBean.firstName}"
      			required="true"/>
      			<h2>Last Name:</h2>
      			<h:inputText id="inputLastName" value="#{customerBackingBean.lastName}"
      			required="true"/>
      			<br/>
				<br/>
      			<h:commandButton id="submitButton" value="Submit" action="#{customerBackingBean.addCustomer}"/>
      		</h:form>
      	</div>
     	<br style="clear: both"/>
      </body>
</html>
