<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="jakarta.faces.facelets"
        xmlns:h="jakarta.faces.html"
        xmlns:f="jakarta.faces.core">
        
      <head>
      	<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
      	<link rel="stylesheet" href="style.css"/>
        <title>newbook</title>
      </head>
      
      <body>
      	<div id="content">
      		<a href="home.xhtml">Home</a>
      		<h1>Add Book</h1>
      		<br/>
      		<h:messages id="messages2" globalOnly="false"/>
      		<h:form id="addbook">
      			<h2>Title:</h2>
      			<h:inputText id="inputTitle" value="#{library.newTitle}"
      			required="true"/>
      			<h2>Author:</h2>
      			<h:inputText id="inputAuthor" value="#{library.newAuthor}"
      			required="true"/>
      			<h2>Release Year:</h2>
      			<h:inputText id="inputReleaseYear" value="#{library.newReleaseYear}"
      			required="true"/>
      			<h2>Genre:</h2>
      			<h:inputText id="inputGenre" value="#{library.newGenre}"
      			required="true"/>
      			<br/>
      			<h:commandButton id="submitButton" value="Submit" action="#{library.addBook}"/>
      		</h:form>
      	</div>
     	<br style="clear: both"/>
      </body>
</html>
