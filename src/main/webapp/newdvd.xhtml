<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="jakarta.faces.facelets"
        xmlns:h="jakarta.faces.html"
        xmlns:f="jakarta.faces.core">
        
      <h:head>
      	<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1"/>
      	<h:outputStylesheet name="css/output.css"/>
        <title>newdvd</title>
      </h:head>
      
      <body>
		<div class="topnav">
			<a href="home.xhtml">Home</a>
			<a href="newbook.xhtml">New Book</a>
			<a class="active" href="newdvd.xhtml">New DVD</a>
			<div class="themeToggleContainer">
				<h:commandButton id="themeToggle" image="#{resource['images:theme.png']}"/>
			</div>
			<h:outputScript name="js/toggle.js"/>
		</div>
      	<div id="content">
      		<h:messages id="messages3" globalOnly="false"/>
      		<h:form id="adddvd">
      			<h2>Title:</h2>
      			<h:inputText id="inputTitle" value="#{library.newTitle}"
      			required="true"/>
      			<h2>Release Year:</h2>
      			<h:inputText id="inputReleaseYear" value="#{library.newReleaseYear}"
      			required="true"/>
      			<h2>Length:</h2>
      			<h:inputText id="inputGenre" value="#{library.newLength}"
      			required="true"/>
      			<br/>
				<br/>
      			<h:commandButton id="submitButton" value="Submit" action="#{library.addDvd}"/>
      		</h:form>
      	</div>
     	<br style="clear: both"/>
      </body>
</html>
