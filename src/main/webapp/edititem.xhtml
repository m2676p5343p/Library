<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="jakarta.faces.facelets"
        xmlns:h="jakarta.faces.html"
        xmlns:f="jakarta.faces.core">
    <h:head>
      	<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
      	<h:outputStylesheet library="css" name="output.css"/>
        <title>Edit Item</title>
    </h:head>
    <body>
        <div class="content">
            <h:form id="editItem">
                <h1>Edit Item</h1>
                <h2>Title:</h2>
      			<h:inputText id="inputTitle" value="#{library.selectedItem.title}"
      			required="true"/>
      			<h2>Author:</h2>
      			<h:inputText id="inputAuthor" value="#{library.selectedItem.author}"
      			required="true"/>
      			<h2>Genre:</h2>
      			<h:inputText id="inputGenre" value="#{library.selectedItem.genre}"
      			required="true"/>
                <br/>
                <br/>
                <h:commandButton value="Cancel" action="home?faces-redirect=true" immediate="true"/>
                <h:commandButton value="Submit" action="#{library.editItem}"/>
            </h:form>
        </div>
    </body>
</html>
