<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="jakarta.faces.facelets"
        xmlns:h="jakarta.faces.html"
        xmlns:f="jakarta.faces.core">
        
      <h:head>
      	<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
      	<h:outputStylesheet library="css" name="output.css"/>
        <title>library</title>
      </h:head>
      
      <body>
		<div class="topnav">
			<a class="active" href="home.xhtml">Home</a>
			<a href="newbook.xhtml">New Book</a>
			<div class="themeToggleContainer">
				<h:commandButton id="themeToggle" image="#{resource['images:theme.png']}"/>
			</div>
			<h:outputScript name="js/toggle.js"/>
		</div>
      	<div class="content">
      		<h1>Library</h1>
      		<h:messages id="messages" globalOnly="false"/>
      		<br/>
      		<h:dataTable value="#{library.books}" var="book">
				<h:column>
					<f:facet name="header">ID</f:facet>
					<h:outputText value="#{book.id}"/>
				</h:column>
      			<h:column>
      				<f:facet name="header">Title</f:facet>
      				<h:outputText value="#{book.title}"/>
      			</h:column>
      			<h:column>
      				<f:facet name="header">Author</f:facet>
      				<h:outputText value="#{book.author}"/>
      			</h:column>
      			<h:column>
      				<f:facet name="header">Genre</f:facet>
      				<h:outputText value="#{book.genre}"/>
      			</h:column>
      		</h:dataTable>
      	</div>
     	<br style="clear: both"/>
      </body>
</html>
