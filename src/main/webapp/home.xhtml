<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="jakarta.faces.facelets"
        xmlns:h="jakarta.faces.html"
        xmlns:f="jakarta.faces.core">
        
      <h:head>
      	<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
      	<h:outputStylesheet library="css" name="output.css"/>
        <title>library</title>
      </h:head>
      
      <body>
		<ui:include src="/WEB-INF/topnav.xhtml"/>
		<ui:insert name="aah"/>
      	<div class="content">
      		<h1>Library</h1>
			<h:form id="bookTable">
				<h:messages id="messages" globalOnly="false"/>
				<br/>
				<h:dataTable value="#{library.items}" var="item">
					<h:column>
						<f:facet name="header">ID</f:facet>
						<h:outputText value="#{item.id}"/>
					</h:column>
					<h:column>
						<f:facet name="header">Title</f:facet>
						<h:outputText value="#{item.title}"/>
					</h:column>
					<h:column>
						<f:facet name="header">Author</f:facet>
						<h:outputText value="#{item.type eq 'book' ? item.author : '-'}"/>
					</h:column>
					<h:column>
						<f:facet name="header">Duration</f:facet>
						<h:outputText value="#{item.type eq 'dvd' ? item.duration : '-'}"/>
					</h:column>
					<h:column>
						<f:facet name="header">Genre</f:facet>
						<h:outputText value="#{item.genre}"/>
					</h:column>
					<h:column>
						<f:facet name="header">Available</f:facet>
						<h:outputText value="#{item.available ? 'y' : 'n'}"/>
					</h:column>
				</h:dataTable>
			</h:form>
      	</div>
     	<br style="clear: both"/>
      </body>
</html>
