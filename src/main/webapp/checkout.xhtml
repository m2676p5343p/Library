<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="jakarta.faces.facelets"
        xmlns:h="jakarta.faces.html"
        xmlns:f="jakarta.faces.core">
        
    <h:head><meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
        <h:outputStylesheet name="css/output.css"/>
        <h:outputStylesheet name="css/form.css"/>
        <title>checkout</title>
    </h:head>
    <body>
        <ui:include src="/WEB-INF/topnav.xhtml"/>
		<ui:insert name="aah"/>
        <div id="content">
            <h:form id="checkoutForm">
                <h:messages id="messages" globalOnly="false"/>
                <h:dataTable value="#{checkoutBackingBean.checkouts}" var="checkout">
                    <h:column>
                        <f:facet name="header">Customer First Name</f:facet>
                        <h:outputText value="#{checkout.customer.firstName}"/>
                    </h:column>
                    <h:column>
                        <f:facet name="header">Customer Last Name</f:facet>
                        <h:outputText value="#{checkout.customer.lastName}"/>
                    </h:column>
                    <h:column>
                        <f:facet name="header">Type</f:facet>
                        <h:outputText value="#{checkout.item.type}"/>
                    </h:column>
                    <h:column>
                        <f:facet name="header">Title</f:facet>
                        <h:outputText value="#{checkout.item.title}"/>
                    </h:column>
                    <h:column>
                        <f:facet name="header">Checkout Date</f:facet>
                        <h:outputText value="#{checkout.checkoutDate}"/>
                    </h:column>
                    <h:column>
                        <f:facet name="header">Due Date</f:facet>
                        <h:outputText value="#{checkout.dueDate}"/>
                    </h:column>
                    <h:column>
                        <f:facet name="header">Overdue</f:facet>
                        <h:outputText
                            value="#{checkout.overdue ? 'y' : 'n'}"
                            styleClass="#{checkout.overdue ? 'outputTextUnavailable' : 'outputTextAvailable'}"
                        />
                    </h:column>
                    <h:column>
                        <f:facet name="header">Actions</f:facet>
                        <h:commandButton value="Return" action="#{checkoutBackingBean.returnItem}">
                            <f:setPropertyActionListener target="#{checkoutBackingBean.selectedCheckout}" value="#{checkout}"/>
                        </h:commandButton>
                    </h:column>
                </h:dataTable>

                <div class="inputPair">
                    <h:outputLabel for="itemSelect" value="Item:"/>
                    <h:selectOneMenu id="itemSelect" value="#{checkoutBackingBean.itemId}">
                        <f:selectItem itemValue="#{null}" itemLabel="-- select one --" noSelectionOption="true"/>
                        <f:selectItems value="#{checkoutBackingBean.availableItems}" var="item" itemValue="#{item.id}" itemLabel="#{item.type} : #{item.title}"/>
                    </h:selectOneMenu>
                </div>
                <div class="inputPair">
                    <h:outputLabel for="customerSelect" value="Customer:"/>
                    <h:selectOneMenu id="customerSelect" value="#{checkoutBackingBean.customerId}">
                        <f:selectItem itemValue="#{null}" itemLabel="-- select one --" noSelectionOption="true"/>
                        <f:selectItems value="#{customerBackingBean.customers}" var="customer" itemValue="#{customer.id}" itemLabel="#{customer.firstName} #{customer.lastName}"/>
                    </h:selectOneMenu>
                </div>
                <h:commandButton class="submitButton" value="Submit" action="#{checkoutBackingBean.addCheckout}"/>
            </h:form>
        </div>
    </body>
</html>
